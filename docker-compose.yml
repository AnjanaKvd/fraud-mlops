services:
  # ---------------------------------------------------------------------------
  # fraud-api: FastAPI fraud detection service
  # ---------------------------------------------------------------------------
  fraud-api:
    build:
      context: . # Build from the repo root (where the Dockerfile lives)
      dockerfile: Dockerfile

    container_name: fraud-api

    # Load all environment variables from the .env file.
    # Create a .env file based on .env.example before running.
    env_file:
      - .env

    # These can be overridden here; values in .env take precedence unless
    # you prefer to set them explicitly below.
    environment:
      - PORT=8000
      # The entrypoint.sh script will copy this DB to /tmp, patch the Windows
      # artifact URIs inside it, and export a new MLFLOW_TRACKING_URI at runtime.
      - MLFLOW_TRACKING_URI=sqlite:////app/mlruns.db
      - MLFLOW_DB_PATH=/app/mlruns.db
      # Explicit path so inference_logger always finds the volume-mounted DB
      - PREDICTIONS_DB_PATH=/app/predictions.db

    ports:
      # Map host port 8000 → container port 8000
      - "8000:8000"

    volumes:
      # mlruns.db — MLflow SQLite tracking DB (contains the Model Registry).
      # Mounted read-only; entrypoint copies it to /tmp before patching.
      - ./mlruns.db:/app/mlruns.db:ro

      # mlruns/ — artifact store (model weights, metrics, artefacts).
      # entrypoint.sh patches URIs in the DB to resolve here.
      - ./mlruns:/mlruns:ro

      # predictions.db — inference log; must be writable.
      - ./predictions.db:/app/predictions.db

    # Restart the container automatically unless explicitly stopped
    restart: unless-stopped

    # Basic health-check: poll the /health endpoint every 30 s
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
