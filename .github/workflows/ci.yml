# ──────────────────────────────────────────────────────────────────────────────
# CI Workflow — Fraud MLOps (FastAPI + MLflow)
#
# Badge URL (add to your README.md):
#   [![CI](https://github.com/AnjanaKvd/fraud-mlops/actions/workflows/ci.yml/badge.svg)](https://github.com/AnjanaKvd/fraud-mlops/actions/workflows/ci.yml)
# ──────────────────────────────────────────────────────────────────────────────

name: CI

on:
  # Run on every push to any branch
  push:
    branches:
      - "**"
  # Run on pull requests targeting main only
  pull_request:
    branches:
      - main

# Shared environment variables available to all jobs and steps
env:
  MLFLOW_TRACKING_URI: sqlite:///mlruns.db

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        # Fetches the full repo so all source files are available to subsequent steps

      # ── 2. Python setup ───────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          # Pins the exact interpreter version used in production

      # ── 3. Cache pip packages ─────────────────────────────────────────────────
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          # Cache the pip download cache directory to avoid re-downloading packages
          path: ~/.cache/pip
          # Key includes the hash of requirements.txt so the cache is invalidated
          # automatically whenever dependencies change
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # ── 4. Install dependencies ───────────────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install project dependencies from requirements.txt
          pip install -r requirements.txt
          # Install flake8 separately in case it is not listed in requirements
          pip install flake8

      # ── 5. Lint with flake8 ───────────────────────────────────────────────────
      - name: Lint with flake8
        run: |
          # Run flake8 on the whole project.
          # --max-line-length=120 avoids failures on lines that are slightly over
          # the PEP-8 default of 79 characters (common in FastAPI/ML code).
          # --count  – print the total number of errors and warnings at the end.
          # --statistics – show how many times each error/warning code appears.
          flake8 . \
            --max-line-length=120 \
            --count \
            --statistics \
            --exclude=.git,__pycache__,.venv,venv,mlruns,dist,build

      # ── 6. Run tests with pytest ──────────────────────────────────────────────
      - name: Run tests with pytest
        run: |
          # -v / --verbose  – show each individual test name and result
          # --tb=short      – shorter traceback format for faster scanning
          pytest tests/ -v --tb=short

      # ── 7. Comment on commit when tests pass ──────────────────────────────────
      - name: Comment on commit (tests passed)
        # Only comment when this is a push event (not a PR), and the previous
        # steps succeeded. The if: success() guard is implicit for standard steps,
        # but made explicit here for clarity.
        if: github.event_name == 'push' && success()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // Post a commit status comment so developers get quick feedback
            // directly on the commit page in GitHub.
            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: `✅ **CI passed** — all lint checks and tests succeeded for \`${context.sha.substring(0, 7)}\` on branch \`${context.ref.replace('refs/heads/', '')}\`.`
            });
